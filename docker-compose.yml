services:
  mail:
    build:
      context: .
      args:
        - HOST_MAIL_UID=${HOST_MAIL_UID}
        - HOST_MAIL_GID=${HOST_MAIL_GID}
    image: mail-inbox-img
    container_name: mail-inbox
    restart: unless-stopped
    ports:
      - "25:25"
    volumes:
      - ./mail-data:/var/mail          # inbox mail files
      - ./mail-config:/etc/mail        # accounts and domains
    cap_add:
      - NET_BIND_SERVICE               # required to bind the port 25
